services:
  backend:
    build:
      context: ../backend
    ports:
      - "8080:8080"
    environment:
      PARKVISION_PERSISTENCE_MODE: jdbc
      PARKVISION_DATASOURCE_URL: jdbc:h2:file:/data/parkvision;MODE=MySQL;DB_CLOSE_DELAY=-1
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
