<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="520" viewBox="0 0 1280 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="520" rx="28" fill="url(#bg)" />
  <text x="40" y="52" font-size="34" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI" font-weight="700">
      <tspan x="40" dy="0">DeviceService.setEmergency 控制流</tspan>
    </text>
  <text x="40" y="84" font-size="18" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="40" dy="0">测试目标是验证 AI 入侵与人工急停能否一致地联动摄像头、闸机、系统节点与告警。</tspan>
    </text>
  
    <rect x="70" y="140" width="250" height="100" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
    <text x="92" y="180" font-size="23" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="92" dy="0">接收急停指令</tspan>
    </text>
    <text x="92" y="214" font-size="15" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="92" dy="0">控制台或 AI 入侵事件触发</tspan>
    </text>

    <rect x="390" y="140" width="250" height="100" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
    <text x="412" y="178" font-size="21" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="412" dy="0">更新摄像头 ROI 状态</tspan>
    </text>
    <text x="412" y="214" font-size="15" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="412" dy="0">入侵状态随急停同步</tspan>
    </text>

    <rect x="710" y="140" width="250" height="100" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
    <text x="732" y="178" font-size="21" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="732" dy="0">更新闸机锁定状态</tspan>
    </text>
    <text x="732" y="214" font-size="15" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="732" dy="0">急停后闸机锁定</tspan>
    </text>

    <rect x="1030" y="140" width="180" height="100" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
    <text x="1050" y="178" font-size="21" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="1050" dy="0">写入安全事件</tspan>
    </text>
    <text x="1050" y="214" font-size="15" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="1050" dy="0">急停生效 / 解除</tspan>
    </text>

    <rect x="280" y="330" width="280" height="104" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
    <text x="304" y="368" font-size="21" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="304" dy="0">更新系统节点健康等级</tspan>
    </text>
    <text x="304" y="406" font-size="15" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="304" dy="0">预警 / 稳定</tspan>
    </text>

    <rect x="700" y="330" width="320" height="104" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
    <text x="724" y="366" font-size="19" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="724" dy="0">若 active=true，则新增高优先</tspan>
      <tspan x="724" dy="26">级告警</tspan>
    </text>
    <text x="724" y="406" font-size="15" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">
      <tspan x="724" dy="0">记录操作台触发的急停告警</tspan>
    </text>

    <line x1="320" y1="190" x2="390" y2="190" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="640" y1="190" x2="710" y2="190" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="960" y1="190" x2="1030" y2="190" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="835" y1="240" x2="835" y2="290" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="835" y1="290" x2="420" y2="290" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
    <line x1="835" y1="290" x2="860" y2="290" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
    <line x1="420" y1="290" x2="420" y2="330" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
    <line x1="860" y1="290" x2="860" y2="330" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
  
</svg>
