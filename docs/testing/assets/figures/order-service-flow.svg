<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="500" viewBox="0 0 1280 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="500" rx="28" fill="url(#bg)" />
  <text x="40" y="52" font-size="34" font-weight="700" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">OrderService.changeStatus 控制流</text>
  <text x="40" y="82" font-size="18" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">白盒测试重点覆盖 3 条业务分支：取车、临时取物、支付完成。</text>
  
        <rect x="80" y="140" width="220" height="92" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="102" y="180" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">接收订单状态变更</text>
        <text x="102" y="210" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">输入订单号与目标状态</text>
      

        <rect x="380" y="140" width="220" height="92" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="402" y="180" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">查找订单</text>
        <text x="402" y="210" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">未找到则返回订单不存在</text>
      

        <rect x="680" y="140" width="220" height="92" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="702" y="180" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">同步车位状态</text>
        <text x="702" y="210" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">取车/临取时切换为周转区</text>
      

        <rect x="980" y="140" width="220" height="92" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="1002" y="180" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">完成订单计算金额</text>
        <text x="1002" y="210" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">按时长阶梯 + 充电附加费</text>
      

        <rect x="220" y="320" width="240" height="96" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="242" y="360" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">取车分支</text>
        <text x="242" y="390" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">插入标准取车队列</text>
      

        <rect x="500" y="320" width="240" height="96" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="522" y="360" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">临时取物分支</text>
        <text x="522" y="390" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">插入临停取物队列</text>
      

        <rect x="780" y="320" width="240" height="96" rx="20" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <text x="802" y="360" font-size="22" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">支付完成分支</text>
        <text x="802" y="390" font-size="16" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">释放车位并记录出口事件</text>
      
    <line x1="300" y1="186" x2="380" y2="186" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="600" y1="186" x2="680" y2="186" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="900" y1="186" x2="980" y2="186" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <line x1="790" y1="232" x2="790" y2="280" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
