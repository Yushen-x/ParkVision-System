<?xml version="1.0" encoding="UTF-8"?>
<svg width="1240" height="380" viewBox="0 0 1240 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="1240" height="380" rx="28" fill="url(#bg)" />
  <text x="40" y="52" font-size="34" font-weight="700" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">系统测试执行流程</text>
  <text x="40" y="82" font-size="18" fill="#94a3b8" font-family="Microsoft YaHei, Segoe UI">本轮测试采用“部署 -&gt; 功能 -&gt; 异常 -&gt; 性能 -&gt; 汇总”的完整闭环。</text>
  
        <rect x="40" y="150" width="210" height="170" rx="22" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <circle cx="78" cy="188" r="22" fill="#38bdf8" />
        <text x="71" y="196" font-size="22" font-weight="700" fill="#0f172a" font-family="Segoe UI">1</text>
        <text x="112" y="190" font-size="24" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">测试计划</text>
        <text x="64" y="240" font-size="18" fill="#cbd5e1" font-family="Microsoft YaHei, Segoe UI">明确范围、对象、功能点、非功能目标</text>
        <line x1="250" y1="235" x2="280" y2="235" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
      

        <rect x="280" y="150" width="210" height="170" rx="22" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <circle cx="318" cy="188" r="22" fill="#38bdf8" />
        <text x="311" y="196" font-size="22" font-weight="700" fill="#0f172a" font-family="Segoe UI">2</text>
        <text x="352" y="190" font-size="24" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">环境部署</text>
        <text x="304" y="240" font-size="18" fill="#cbd5e1" font-family="Microsoft YaHei, Segoe UI">启动前后端、数据库、模拟设备并校验健康状态</text>
        <line x1="490" y1="235" x2="520" y2="235" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
      

        <rect x="520" y="150" width="210" height="170" rx="22" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <circle cx="558" cy="188" r="22" fill="#38bdf8" />
        <text x="551" y="196" font-size="22" font-weight="700" fill="#0f172a" font-family="Segoe UI">3</text>
        <text x="592" y="190" font-size="24" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">功能验证</text>
        <text x="544" y="240" font-size="18" fill="#cbd5e1" font-family="Microsoft YaHei, Segoe UI">执行入场、调度、取车、计费、导航、报表链路</text>
        <line x1="730" y1="235" x2="760" y2="235" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
      

        <rect x="760" y="150" width="210" height="170" rx="22" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <circle cx="798" cy="188" r="22" fill="#38bdf8" />
        <text x="791" y="196" font-size="22" font-weight="700" fill="#0f172a" font-family="Segoe UI">4</text>
        <text x="832" y="190" font-size="24" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">异常验证</text>
        <text x="784" y="240" font-size="18" fill="#cbd5e1" font-family="Microsoft YaHei, Segoe UI">校验非法订单、缺参请求、急停与恢复流程</text>
        <line x1="970" y1="235" x2="1000" y2="235" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
      

        <rect x="1000" y="150" width="210" height="170" rx="22" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.08)" />
        <circle cx="1038" cy="188" r="22" fill="#38bdf8" />
        <text x="1031" y="196" font-size="22" font-weight="700" fill="#0f172a" font-family="Segoe UI">5</text>
        <text x="1072" y="190" font-size="24" fill="#ffffff" font-family="Microsoft YaHei, Segoe UI">性能评估</text>
        <text x="1024" y="240" font-size="18" fill="#cbd5e1" font-family="Microsoft YaHei, Segoe UI">统计平均响应时间、P95、成功率与稳定性</text>
        
      
</svg>
